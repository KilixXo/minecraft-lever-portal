# LeverPortal Configuration File

# Storage Settings
storage:
  # Storage backend for portal data.
  # Options:
  #   json   — stores data in plugins/LeverPortal/portals/portals.json (default, no extra setup)
  #   sqlite — stores data in plugins/LeverPortal/portals.db (recommended for large servers)
  type: json

# Economy Settings
economy:
  # Enable diamond payment system
  enabled: true
  
  # Global teleportation cost (diamonds per teleport)
  # Set to 0 to disable global cost
  global_teleport_cost: 1
  
  # Portal creation cost settings
  creation:
    # Base cost for creating a portal (diamonds)
    base_cost: 10
    
    # Cost per block distance between portals
    # Formula: base_cost + (distance / blocks_per_diamond) * diamond_cost
    blocks_per_diamond: 100
    diamond_cost_per_distance: 5
    
    # Maximum creation cost (to prevent excessive costs)
    max_cost: 1000

# Portal Settings (M-9: configurable constants)
portal:
  # Teleport cooldown in ticks (20 ticks = 1 second)
  teleport_cooldown_ticks: 40
  
  # Minimum blocks required to create a portal
  min_blocks: 2
  
  # Maximum blocks allowed per portal
  max_blocks: 100
  
  # Minimum distance between linked portals
  min_link_distance: 3.0
  
  # Distance threshold for detecting player inside a portal
  player_detection_radius: 1.5
  
  # Maximum distance from portal center to associate a lever
  max_lever_distance: 10.0

# Portal-specific costs
# Format:
# portal_costs:
#   portal_name: cost_in_diamonds
portal_costs: {}

# Player-specific costs
# Format:
# player_costs:
#   player_uuid:
#     portal_name: cost_in_diamonds
player_costs: {}

# Access Control Settings
access_control:
  # Entity filtering - control which entities can use portals
  entity_filtering:
    # Enable entity filtering
    enabled: true
    
    # List of allowed entity types (case-insensitive)
    # Common types: PLAYER, VILLAGER, ZOMBIE, SKELETON, CREEPER, ENDERMAN, etc.
    # See: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/entity/EntityType.html
    allowed_entities:
      - PLAYER
      - VILLAGER
  
  # Default access mode for new portals
  # Options: PUBLIC, PRIVATE, WHITELIST, BLACKLIST
  # PUBLIC: Everyone can use (denied list still applies)
  # PRIVATE: Only owner
  # WHITELIST: Only explicitly allowed players (+ owner)
  # BLACKLIST: Everyone except denied players
  default_access_mode: PUBLIC

# Messages
messages:
  insufficient_funds: "§cYou don't have enough diamonds! Required: %cost%, You have: %balance%"
  payment_success: "§aPaid %cost% diamonds for teleportation."
  creation_cost: "§ePortal creation will cost %cost% diamonds. Type /portal confirm to proceed."
  creation_success: "§aPortal created! Paid %cost% diamonds."
  cost_info: "§eTeleportation cost: %cost% diamonds"
  access_denied: "§cYou don't have permission to use this portal!"
  not_owner: "§cYou are not the owner of this portal!"
  player_allowed: "§aPlayer %player% can now use this portal."
  player_denied: "§cPlayer %player% is now denied from using this portal."
  player_access_removed: "§ePlayer %player% access has been reset."
  access_mode_changed: "§aPortal access mode changed to %mode%."
